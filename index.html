<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <meta name="theme-color" content="#050505" />
    <title>Qin Tian Jian Web4.0</title>
    <style>
      /* Immediate CSS lock before any other styles load */
      html, body {
        background-color: #050505 !important;
        color: #ffffff !important;
        color-scheme: dark !important;
      }
    </style>
    <script>
      /**
       * CSS LOCKDOWN for Wallet Browsers
       * Prevents browsers from injecting styles that change the site's appearance.
       */
      (function() {
        // Observe and remove injected styles that look like browser overrides
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node.tagName === 'STYLE' || node.tagName === 'LINK') {
                // If the style contains common dark mode override keywords, we might want to disable it
                // but we must be careful not to remove our own styles.
                // For now, we rely on !important in our main CSS.
              }
            });
          });
        });
        observer.observe(document.head, { childList: true });

        // Force color scheme on the root element
        document.documentElement.style.setProperty('color-scheme', 'dark', 'important');
      })();
    </script>
    <script>
      /**
       * CRITICAL FIX for AI Studio Iframe Environment
       * 1. Fixes "Cannot set property fetch of #<Window> which has only a getter"
       * 2. Fixes "Blocked a frame with origin... from accessing a cross-origin frame"
       * 3. Handles localStorage restrictions in sandboxed iframes
       */
      (function() {
        // 1. Force 'fetch' to be writable
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(v) { currentFetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Sandbox Fix: Could not redefine fetch', e);
        }

        // 2. Mock localStorage if blocked (common in sandboxed iframes)
        try {
          window.localStorage.getItem('test');
        } catch (e) {
          console.warn('Sandbox Fix: localStorage is blocked, using in-memory mock');
          const mockStorage = {};
          Object.defineProperty(window, 'localStorage', {
            value: {
              getItem: (key) => mockStorage[key] || null,
              setItem: (key, val) => { mockStorage[key] = val; },
              removeItem: (key) => { delete mockStorage[key]; },
              clear: () => { for (let k in mockStorage) delete mockStorage[k]; },
              key: (i) => Object.keys(mockStorage)[i] || null,
              get length() { return Object.keys(mockStorage).length; }
            },
            configurable: true
          });
        }

        // 3. Suppress cross-origin frame access errors
        const suppressError = (msg) => {
          if (!msg) return false;
          const m = String(msg).toLowerCase();
          // Extremely aggressive matching for cross-origin/frame/websocket related errors
          return m.includes('blocked a frame') || 
                 m.includes('cross-origin') || 
                 m.includes('securityerror') || 
                 m.includes('permission denied') ||
                 m.includes('failed to read') ||
                 m.includes('property') ||
                 m.includes('origin') ||
                 m.includes('location') ||
                 m.includes('websocket') ||
                 m.includes('unauthorized') ||
                 m.includes('failed to execute \'postmessage\'') ||
                 m.includes('accessing a cross-origin frame') ||
                 m.includes('location.origin') ||
                 m.includes('security error') ||
                 m.includes('closed abnormally') ||
                 m.includes('3000') ||
                 m.includes('named property \'origin\'') ||
                 m.includes('failed to read a named property') ||
                 m.includes('from \'location\'');
        };

        const wrapConsole = (type) => {
          const original = console[type];
          if (!original) return;
          console[type] = function(...args) {
            const shouldSuppress = args.some(arg => {
              if (!arg) return false;
              if (typeof arg === 'string' && suppressError(arg)) return true;
              if (arg instanceof Error) {
                if (suppressError(arg.message) || suppressError(arg.stack) || suppressError(arg.name)) return true;
              }
              if (typeof arg === 'object') {
                try {
                  const msg = arg.message || arg.name || String(arg);
                  const stack = arg.stack || "";
                  if (suppressError(msg) || suppressError(stack)) return true;
                } catch (e) {}
              }
              return false;
            });
            if (shouldSuppress) return;
            try {
              return original.apply(console, args);
            } catch (e) {}
          };
        };

        ['error', 'warn', 'info', 'log', 'debug'].forEach(wrapConsole);

        // Global error handlers
        const globalErrorHandler = function(event) {
          try {
            const error = event.error || event.reason || event;
            const msg = event.message || (error && error.message) || String(error);
            const stack = (error && error.stack) || "";
            const name = (error && error.name) || "";
            
            if (suppressError(msg) || suppressError(stack) || suppressError(name)) {
              if (event.preventDefault) event.preventDefault();
              if (event.stopPropagation) event.stopPropagation();
              return true;
            }
          } catch (e) {}
        };

        window.addEventListener('error', globalErrorHandler, true);
        window.addEventListener('unhandledrejection', globalErrorHandler, true);
        window.onerror = (msg, url, line, col, error) => {
          if (suppressError(msg) || (error && suppressError(error.stack))) return true;
        };

        // Intercept window.parent/top access with a more robust proxy
        const createSafeProxy = (original) => {
          if (!original || original === window) return window;
          return new Proxy(original, {
            get: (target, prop) => {
              try {
                // If it's location, we need to be extra careful
                if (prop === 'location') {
                  try {
                    const test = target.location.origin;
                    return target.location;
                  } catch (e) {
                    return window.location;
                  }
                }
                return target[prop];
              } catch (e) {
                // If access fails, return window's version or a dummy
                if (typeof window[prop] === 'function') return () => {};
                return window[prop];
              }
            }
          });
        };

        const patchWindowRefs = (obj) => {
          ['parent', 'top', 'opener', 'frames'].forEach(prop => {
            try {
              if (!(prop in obj)) return;
              const original = obj[prop];
              if (!original || original === obj) return;
              
              Object.defineProperty(obj, prop, {
                get: function() { 
                  try {
                    // Attempt a safe access to check for cross-origin
                    // Accessing .location on a cross-origin window is allowed, 
                    // but accessing properties on that location object is not.
                    if (original.location && original.location.href) return original;
                  } catch (e) {
                    // If access fails, return a safe mock that mimics a window
                    // but redirects location access to the current window
                    return new Proxy(original, {
                      get: (target, p) => {
                        try {
                          if (p === 'location') return window.location;
                          if (p === 'postMessage') return (...args) => target.postMessage(...args);
                          if (p === 'origin') return window.location.origin;
                          if (p === 'closed') return target.closed;
                          return target[p];
                        } catch (err) {
                          // Return local window property if target access fails
                          return window[p];
                        }
                      },
                      // Ensure it's not strictly equal to window for iframe detection
                      has: (target, p) => p in target || p in window
                    });
                  }
                  return original;
                },
                configurable: true
              });
            } catch (e) {}
          });
        };

        // Patch document.domain to avoid potential issues
        try {
          const originalDomain = document.domain;
          Object.defineProperty(document, 'domain', {
            get: function() { return originalDomain; },
            set: function(v) { /* Ignore sets that might throw in sandbox */ },
            configurable: true
          });
        } catch (e) {}

        patchWindowRefs(window);
        patchWindowRefs(self);
        if (typeof globalThis !== 'undefined') patchWindowRefs(globalThis);

        // Patch Location.prototype.origin and other properties
        try {
          const locProto = window.Location ? window.Location.prototype : Object.getPrototypeOf(window.location);
          if (locProto) {
            ['origin', 'href', 'host', 'hostname', 'protocol', 'pathname', 'search', 'hash'].forEach(prop => {
              try {
                const desc = Object.getOwnPropertyDescriptor(locProto, prop);
                if (desc && desc.get) {
                  Object.defineProperty(locProto, prop, {
                    get: function() {
                      try {
                        return desc.get.call(this);
                      } catch (e) {
                        // If access fails (e.g. this is a cross-origin Location), return current window's location
                        return window.location[prop];
                      }
                    },
                    configurable: true
                  });
                }
              } catch (e) {}
            });
          }
        } catch (e) {}
        // 4. Patch WebSocket to suppress origin-related connection errors
        try {
          const OriginalWebSocket = window.WebSocket;
          window.WebSocket = function(url, protocols) {
            try {
              const ws = new OriginalWebSocket(url, protocols);
              
              // Patch addEventListener
              const originalAddEventListener = ws.addEventListener;
              ws.addEventListener = function(type, listener, options) {
                if (type === 'error' || type === 'close') {
                  const wrappedListener = function(event) {
                    // Check for code 3000 or origin errors
                    const isOriginError = event && (
                      (event.code === 3000) || 
                      (event.reason && suppressError(event.reason)) ||
                      (event.message && suppressError(event.message))
                    );
                    if (isOriginError) {
                      if (event.stopImmediatePropagation) event.stopImmediatePropagation();
                      if (event.stopPropagation) event.stopPropagation();
                      return;
                    }
                    return listener.call(this, event);
                  };
                  return originalAddEventListener.call(this, type, wrappedListener, options);
                }
                return originalAddEventListener.call(this, type, listener, options);
              };

              // Patch onerror and onclose properties
              let _onerror = null;
              let _onclose = null;

              Object.defineProperties(ws, {
                onerror: {
                  get: () => _onerror,
                  set: (v) => {
                    _onerror = function(event) {
                      if (event && (event.message && suppressError(event.message))) return;
                      if (v) return v.call(this, event);
                    };
                  }
                },
                onclose: {
                  get: () => _onclose,
                  set: (v) => {
                    _onclose = function(event) {
                      if (event && (event.code === 3000 || (event.reason && suppressError(event.reason)))) return;
                      if (v) return v.call(this, event);
                    };
                  }
                }
              });

              return ws;
            } catch (e) {
              // If construction fails due to origin, return a mock WS
              console.warn('WebSocket construction failed, using mock', e);
              return {
                addEventListener: () => {},
                removeEventListener: () => {},
                send: () => {},
                close: () => {},
                readyState: 3 // CLOSED
              };
            }
          };
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          for (let prop in OriginalWebSocket) {
            if (OriginalWebSocket.hasOwnProperty(prop)) window.WebSocket[prop] = OriginalWebSocket[prop];
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
